name: Deploy Survey App

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Application Bundle
        run: |
          pnpm exec esbuild server.js --bundle --platform=node --target=node20 --outfile=dist/server.js --external:pg-native
          pnpm exec esbuild db_setup.js --bundle --platform=node --target=node20 --outfile=dist/db_setup.js --external:pg-native
          cp -r public dist/

      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Install Sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Setup SSH Config
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config <<EOF
          Host ssh.yuulabs.web.id
            ProxyCommand cloudflared access ssh --hostname %h
            User root
            StrictHostKeyChecking no
          EOF

      - name: Deploying App and Configs
        run: |
          # Create deployment directory if not exists
          sshpass -p "yuu" ssh root@ssh.yuulabs.web.id "mkdir -p /var/www/bina-survey/"

          # Sync compiled standalone output (server.js + db_setup.js + public folder)
          sshpass -p "yuu" rsync -avz --delete ./dist/ root@ssh.yuulabs.web.id:/var/www/bina-survey/
          
          # Sync config files
          sshpass -p "yuu" rsync -avz ./nginx.conf root@ssh.yuulabs.web.id:/var/www/bina-survey/
          sshpass -p "yuu" rsync -avz ./.env root@ssh.yuulabs.web.id:/var/www/bina-survey/
          
          # Restart app under PM2 on the server
          sshpass -p "yuu" ssh root@ssh.yuulabs.web.id "
            # Run database migrations/setup script
            node /var/www/bina-survey/db_setup.js

            # Restart Survey Node Server with PM2 on port 1301
            pm2 delete bina-survey || true
            PORT=1301 pm2 start /var/www/bina-survey/server.js --name bina-survey --cwd /var/www/bina-survey/
          "

          # Copy Nginx Configuration and Reload
          sshpass -p "yuu" ssh root@ssh.yuulabs.web.id "
            cp /var/www/bina-survey/nginx.conf /etc/nginx/sites-available/bina-survey.conf
            ln -sf /etc/nginx/sites-available/bina-survey.conf /etc/nginx/sites-enabled/bina-survey.conf
            
            # Test and reload Nginx config to listen on port 1300
            nginx -t && systemctl reload nginx
          "
